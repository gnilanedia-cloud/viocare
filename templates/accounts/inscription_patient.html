{% extends 'base.html' %}
{% block title %}Inscription patient{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6">
<h4 class="mb-3">Créer mon compte patient</h4>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

</form>
</div></div>
{% endblock %}
