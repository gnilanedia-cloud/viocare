{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-5">
<h4 class="mb-3">Choisir un nouveau mot de passe</h4>
{% if validlink %}
<form method="post">{% csrf_token %}{{ form.as_p }}
<button class="btn text-white" style="background:#0d9488;">Valider</button>
</form>
{% else %}
<div class="alert alert-danger">Ce lien de réinitialisation n'est plus valide.</div>
{% endif %}
</div></div>
{% endblock %}
